<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地址详情 - 企税康协同工作平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    #modal-add-room:not(.hidden) { display: flex; }
  </style>
</head>
<body class="bg-slate-100 text-slate-700">
  <div class="min-h-screen w-full flex">
    <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col shrink-0">
      <div class="h-16 px-3 flex items-center border-b border-slate-800"><div class="w-full rounded-lg bg-white px-2 py-1.5 flex items-center justify-center"><img src="./assets/qishuikang-logo.png" alt="企税康Logo" class="h-8 w-full max-h-8 object-contain object-center mix-blend-multiply"></div></div>
      <nav class="flex-1 py-4 text-sm overflow-y-auto">
        <a class="mx-3 mb-1 h-10 px-4 rounded-lg hover:bg-slate-800 flex items-center" href="index.html"><i class="fa-solid fa-table-columns w-5 mr-2"></i>工作台</a>
        <details class="mx-3 mb-1 group" open>
          <summary class="list-none cursor-pointer h-10 px-4 rounded-lg bg-slate-800/80 flex items-center justify-between text-white [&::-webkit-details-marker]:hidden"><span class="flex items-center"><i class="fa-solid fa-truck-fast w-5 mr-2"></i>交付中心</span><i class="fa-solid fa-chevron-down text-[10px] text-slate-400 transition-transform group-open:rotate-180"></i></summary>
          <div class="mt-1 ml-2 pl-3 border-l border-slate-700 space-y-0.5">
            <a class="block py-2 px-3 rounded-lg text-sm text-slate-300 hover:bg-slate-800 hover:text-white" href="government-affairs.html">政务管理</a>
            <a class="block py-2 px-3 rounded-lg text-sm text-slate-300 hover:bg-slate-800 hover:text-white" href="accounting-customer-management.html">代账客户</a>
            <a class="block py-2 px-3 rounded-lg text-sm bg-blue-600 text-white font-medium" href="address-management.html">地址管理</a>
            <a class="block py-2 px-3 rounded-lg text-sm text-slate-300 hover:bg-slate-800 hover:text-white" href="customer-items.html">客户物品</a>
          </div>
        </details>
      </nav>
    </aside>
    <main class="flex-1 flex flex-col min-w-0">
      <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center"><div class="text-sm text-slate-500">交付中心 / <span class="text-slate-700 font-medium">地址详情</span></div></header>
      <section class="p-6">
        <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm min-h-[calc(100vh-8.5rem)]">
          <div class="text-sm text-slate-500 mb-3">交付中心 / 地址详情</div>
          <div class="flex items-center gap-2 mb-4 text-sm">
            <a href="address-management.html" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-angle-left"></i></a>
            <span class="text-slate-700 font-medium">地址详情</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-6 gap-3 items-end">
            <label class="text-xs text-slate-500 md:col-span-2">公司名称<input class="mt-1 h-9 w-full rounded border border-slate-200 px-3 text-sm" placeholder="请输入"></label>
            <label class="text-xs text-slate-500 md:col-span-2">起止日期<div class="mt-1 flex items-center gap-2"><input class="h-9 w-full rounded border border-slate-200 px-3 text-sm" value="2023-03-21"><span class="text-slate-400">-</span><input class="h-9 w-full rounded border border-slate-200 px-3 text-sm" value="2024-03-21"></div></label>
            <label class="text-xs text-slate-500">所属部门<button type="button" class="mt-1 h-9 w-full rounded border border-slate-200 bg-white px-3 text-left text-sm text-slate-600 flex items-center justify-between">请选择<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></label>
            <label class="text-xs text-slate-500">业务员<button type="button" class="mt-1 h-9 w-full rounded border border-slate-200 bg-white px-3 text-left text-sm text-slate-600 flex items-center justify-between">请选择<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></label>
          </div>
          <div class="mt-3 flex gap-2">
            <button class="h-9 px-4 rounded bg-blue-600 text-white text-sm">查询</button>
            <button class="h-9 px-4 rounded border border-slate-200 bg-white text-sm text-slate-600">重置</button>
            <button id="btn-open-room" class="h-9 px-4 rounded bg-blue-600 text-white text-sm">添加房间</button>
          </div>
          <div class="mt-4 overflow-x-auto rounded border border-slate-200">
            <table class="w-full min-w-[1120px] text-sm">
              <thead class="bg-slate-50 text-slate-600"><tr><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">房间号</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">公司名称</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">领用时间</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">开始日期</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">结束日期</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">金额</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">业务员</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">所属部门</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">合同领用</th><th class="text-left px-3 py-3 border-b border-slate-200 font-medium">操作</th></tr></thead>
              <tbody class="text-slate-700">
                <tr class="hover:bg-slate-50"><td class="px-3 py-3 border-b border-slate-100">625</td><td class="px-3 py-3 border-b border-slate-100">苏州维尔因科技有限公司</td><td class="px-3 py-3 border-b border-slate-100">2026-03-19</td><td class="px-3 py-3 border-b border-slate-100">2025-03-16</td><td class="px-3 py-3 border-b border-slate-100">2028-03-16</td><td class="px-3 py-3 border-b border-slate-100">3500</td><td class="px-3 py-3 border-b border-slate-100">周方林</td><td class="px-3 py-3 border-b border-slate-100">姑苏</td><td class="px-3 py-3 border-b border-slate-100">是</td><td class="px-3 py-3 border-b border-slate-100"><a class="text-blue-600 hover:underline mr-3" href="#">编辑</a><a class="text-blue-600 hover:underline" href="#">删除</a></td></tr>
                <tr class="hover:bg-slate-50"><td class="px-3 py-3 border-b border-slate-100">626</td><td class="px-3 py-3 border-b border-slate-100">苏州共扶科技有限公司</td><td class="px-3 py-3 border-b border-slate-100">2026-03-19</td><td class="px-3 py-3 border-b border-slate-100">2026-03-02</td><td class="px-3 py-3 border-b border-slate-100">2028-03-02</td><td class="px-3 py-3 border-b border-slate-100">3500</td><td class="px-3 py-3 border-b border-slate-100">苏琴</td><td class="px-3 py-3 border-b border-slate-100">网销一组</td><td class="px-3 py-3 border-b border-slate-100">是</td><td class="px-3 py-3 border-b border-slate-100"><a class="text-blue-600 hover:underline mr-3" href="#">编辑</a><a class="text-blue-600 hover:underline" href="#">删除</a></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="modal-add-room" class="fixed inset-0 z-[130] hidden items-center justify-center bg-slate-900/45 p-4">
    <div class="absolute inset-0" data-close-room></div>
    <div class="relative w-full max-w-2xl rounded-xl border border-slate-200 bg-white shadow-xl">
      <div class="relative border-b border-slate-200 px-5 py-4"><h3 class="text-center text-base font-semibold text-slate-800">添加房间</h3><button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" data-close-room><i class="fa-solid fa-xmark text-lg"></i></button></div>
      <div class="px-6 py-5 space-y-3 text-sm">
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">房间号 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="0001"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">公司名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="苏州维尔因科技有限公司"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">领用时间 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="2026-04-16"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">开始日期 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="2026-04-16"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">结束日期 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="2027-04-16"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">金额 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" value="1000"></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">所属部门</label><button class="h-9 rounded border border-slate-200 bg-white px-3 text-left text-slate-600 flex items-center justify-between">网销一组<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">业务员</label><button class="h-9 rounded border border-slate-200 bg-white px-3 text-left text-slate-600 flex items-center justify-between">周芳林<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">合同领用</label><button class="h-9 rounded border border-slate-200 bg-white px-3 text-left text-slate-600 flex items-center justify-between">是<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>
        <div class="grid grid-cols-[90px_1fr] items-start gap-3"><label class="text-right text-slate-600 pt-2">备注说明</label><textarea rows="3" class="rounded border border-slate-200 px-3 py-2" placeholder="请输入"></textarea></div>
        <div class="grid grid-cols-[90px_1fr] items-center gap-3"><label class="text-right text-slate-600">附件上传</label><button class="h-12 w-56 rounded bg-sky-50 text-blue-600 text-sm"><i class="fa-solid fa-circle-plus mr-2"></i>上传附件</button></div>
      </div>
      <div class="flex justify-center gap-3 border-t border-slate-100 px-5 py-4"><button class="h-9 min-w-[90px] rounded-md bg-blue-600 text-white" data-close-room>确认</button><button class="h-9 min-w-[90px] rounded-md border border-slate-300 bg-white text-slate-600" data-close-room>取消</button></div>
    </div>
  </div>
  <script>
    (function () {
      var modal = document.getElementById('modal-add-room');
      document.getElementById('btn-open-room').addEventListener('click', function () { modal.classList.remove('hidden'); modal.classList.add('flex'); });
      modal.querySelectorAll('[data-close-room]').forEach(function (el) { el.addEventListener('click', function () { modal.classList.add('hidden'); modal.classList.remove('flex'); }); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { modal.classList.add('hidden'); modal.classList.remove('flex'); } });
    })();
  </script>
</body>
</html>
