<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑客户信息 - 企税康协同工作平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
  </style>
</head>
<body class="bg-slate-100 text-slate-700">
  <div class="min-h-screen w-full flex">
    <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col shrink-0">
      <div class="h-16 px-3 flex items-center border-b border-slate-800">
        <div class="w-full rounded-lg bg-white px-2 py-1.5 flex items-center justify-center">
          <img src="./assets/qishuikang-logo.png" alt="企税康Logo" class="h-8 w-full max-h-8 object-contain object-center mix-blend-multiply">
        </div>
      </div>
      <nav class="flex-1 py-4 text-sm overflow-y-auto">
        <a class="mx-3 mb-1 h-10 px-4 rounded-lg hover:bg-slate-800 flex items-center" href="index.html"><i class="fa-solid fa-table-columns w-5 mr-2"></i>工作台</a>
        <details class="mx-3 mb-1 group" open>
          <summary class="list-none cursor-pointer h-10 px-4 rounded-lg bg-slate-800/80 flex items-center justify-between text-white [&::-webkit-details-marker]:hidden">
            <span class="flex items-center"><i class="fa-solid fa-users w-5 mr-2"></i>客户中心</span>
            <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 transition-transform group-open:rotate-180"></i>
          </summary>
          <div class="mt-1 ml-2 pl-3 border-l border-slate-700 space-y-0.5">
            <a class="block py-2 px-3 rounded-lg text-sm text-slate-300 hover:bg-slate-800 hover:text-white" href="leads.html">线索管理</a>
            <a class="block py-2 px-3 rounded-lg text-sm bg-blue-600 text-white font-medium" href="customer.html">客户管理</a>
          </div>
        </details>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
      <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shrink-0">
        <div class="text-sm text-slate-500">客户中心 / 客户管理 / <span class="text-slate-700 font-medium">编辑信息</span></div>
        <a href="customer.html" class="text-sm text-blue-600 hover:underline"><i class="fa-solid fa-angle-left mr-1"></i>返回列表</a>
      </header>

      <section class="p-6">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-3">
            <a href="customer.html" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500" aria-label="返回">
              <i class="fa-solid fa-angle-left"></i>
            </a>
            <h2 class="text-base font-semibold text-slate-800">编辑信息</h2>
          </div>

          <form id="form-edit-customer" class="p-5">
            <div class="grid grid-cols-3 gap-x-6 gap-y-5">
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>公司名称</span>
                <input type="text" placeholder="请输入公司名称" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>法定代表人</span>
                <input type="text" placeholder="请输入法定代表人姓名" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>联系电话</span>
                <input type="text" placeholder="请输入联系电话" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>身份证号码</span>
                <input type="text" placeholder="请输入身份证号码" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>股份占比（%）</span>
                <input type="text" placeholder="请输入股份占比" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>联系电话</span>
                <input type="text" placeholder="请输入联系电话" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>联系方式</span>
                <input type="text" placeholder="请输入联系方式" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <div class="text-sm text-slate-700 space-y-1">
                <span class="block">主体类型</span>
                <div class="h-10 px-3 rounded-lg border border-slate-200 flex items-center gap-6 text-sm">
                  <label class="inline-flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="rounded border-slate-300">
                    <span>自然人</span>
                  </label>
                  <label class="inline-flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="rounded border-slate-300" checked>
                    <span>公司</span>
                  </label>
                </div>
              </div>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>股份占比（%）</span>
                <input type="text" placeholder="请输入股份占比" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>企业账号</span>
                <input type="text" placeholder="请输入企业账号" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>法定代表人</span>
                <input type="text" placeholder="请输入法定代表人姓名" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>身份证号码</span>
                <input type="text" placeholder="请输入身份证号码" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>联系电话</span>
                <input type="text" placeholder="请输入联系电话" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <div class="text-sm text-blue-600 flex items-end pb-2">
                <button type="button" class="hover:underline"><i class="fa-solid fa-plus mr-1"></i>添加股东</button>
              </div>
              <div></div>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>内部财务</span>
                <input type="text" placeholder="请输入财务姓名" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>股份占比（%）</span>
                <input type="text" placeholder="请输入股份占比" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>联系电话</span>
                <input type="text" placeholder="请输入联系电话" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>

              <label class="text-sm text-slate-700 space-y-1 block">
                <span>身份证号码</span>
                <input type="text" placeholder="请输入身份证号码" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>注册资本（万）</span>
                <input type="text" placeholder="请输入注册资本" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
              <label class="text-sm text-slate-700 space-y-1 block">
                <span>注册地址</span>
                <input type="text" placeholder="常规产业园，租赁合同到期前一到" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm">
              </label>
            </div>

            <label class="text-sm text-slate-700 space-y-1 block mt-5">
              <span>经营范围</span>
              <textarea rows="3" placeholder="请输入经营范围" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm resize-none"></textarea>
            </label>

            <div class="grid grid-cols-2 gap-6 mt-5">
              <div>
                <p class="text-sm text-slate-700 mb-3">法人身份证</p>
                <div class="grid grid-cols-2 gap-4">
                  <div class="h-24 rounded-lg bg-sky-50 border border-slate-200 flex flex-col items-center justify-center text-xs text-sky-600">
                    <span class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center mb-2"><i class="fa-solid fa-plus"></i></span>
                    上传身份证正面
                  </div>
                  <div class="h-24 rounded-lg bg-sky-50 border border-slate-200 flex flex-col items-center justify-center text-xs text-sky-600">
                    <span class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center mb-2"><i class="fa-solid fa-plus"></i></span>
                    上传身份证反面
                  </div>
                </div>
              </div>
              <div>
                <p class="text-sm text-slate-700 mb-3">营业执照（需上传原件照片）</p>
                <div class="h-24 max-w-[180px] rounded-lg bg-sky-50 border border-slate-200 flex flex-col items-center justify-center text-xs text-sky-600">
                  <span class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center mb-2"><i class="fa-solid fa-plus"></i></span>
                  上传营业执照
                </div>
              </div>
            </div>

            <div class="mt-5">
              <p class="text-sm text-slate-700 mb-1">其他附件（照片）<span class="text-xs text-slate-400 ml-1">支持jpg、png格式图片上传</span></p>
              <div class="h-24 max-w-[180px] rounded-lg bg-sky-50 border border-slate-200 flex flex-col items-center justify-center text-xs text-sky-600">
                <span class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center mb-2"><i class="fa-solid fa-plus"></i></span>
                上传图片
              </div>
            </div>

            <div class="mt-5">
              <p class="text-sm text-slate-700 mb-1">其他附件（文件）<span class="text-xs text-slate-400 ml-1">支持pdf文档上传</span></p>
              <div class="h-24 max-w-[180px] rounded-lg bg-sky-50 border border-slate-200 flex flex-col items-center justify-center text-xs text-sky-600">
                <span class="w-8 h-8 rounded-full bg-sky-500 text-white flex items-center justify-center mb-2"><i class="fa-solid fa-plus"></i></span>
                上传文件
              </div>
            </div>

            <div class="mt-10 flex justify-center gap-4">
              <button type="submit" class="h-10 min-w-28 px-6 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">提交信息</button>
              <a href="customer.html" class="h-10 min-w-24 px-6 rounded-lg border border-slate-300 text-slate-600 text-sm inline-flex items-center justify-center hover:bg-slate-50">取消</a>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div id="toast-submit-success" class="fixed top-6 left-1/2 -translate-x-1/2 z-[120] hidden px-5 py-2.5 rounded-lg bg-slate-800 text-white text-sm shadow-lg">提交成功</div>

  <script>
    (function () {
      var form = document.getElementById('form-edit-customer');
      var toast = document.getElementById('toast-submit-success');
      var timer;
      if (!form || !toast) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        toast.classList.remove('hidden');
        clearTimeout(timer);
        timer = setTimeout(function () {
          toast.classList.add('hidden');
        }, 2200);
      });
    })();
  </script>
</body>
</html>
