            法定代表人: '陈某',
            股份占比: '100%',
            联系电话: '0512-55550004',
            身份证号码: '3205**********4466',
            内部财务: '赵会计',
            联系电话2: '13600003333',
            身份证号码2: '3205**********8899',
            注册资本: '300万元',
            注册地址: '苏州市昆山市花桥镇绿地大道1000号'
          },
          scope: '日用百货、五金交电、机械设备及配件销售；商务信息咨询。',
          progress: [
            { node: '提交材料', status: '已完成', agent: '马时笑', date: '2026-03-15', desc: '材料已递交窗口', action: '' },
            { node: '领取执照', status: '已完成', agent: '马时笑', date: '2026-03-28', desc: '新照已归档', action: '' }
          ]
        }
      };

      var params = new URLSearchParams(location.search);
      var id = params.get('id') || 'gov-1';
      if (!dataMap[id]) id = 'gov-1';
      var d = dataMap[id];

      function kvGrid(obj, el) {
        var keys = Object.keys(obj);
        el.innerHTML = keys.map(function (k) {
          var v = obj[k];
          if (v && typeof v === 'object' && v.text) {
            return '<div><p class="text-xs text-slate-500 mb-1">' + k + '</p><p class="text-sm"><a href="' + (v.href || '#') + '" class="text-blue-600 hover:underline">' + v.text + '</a></p></div>';
          }
          var show = v;
          if (k === '手机号码' && show && show !== '—') {
            show = '<span class="inline-flex items-center gap-2">' + v + ' <button type="button" class="text-slate-400 hover:text-blue-600" title="复制"><i class="fa-regular fa-copy text-xs"></i></button></span>';
          } else {
            show = '<span class="text-slate-800">' + v + '</span>';
          }
          return '<div><p class="text-xs text-slate-500 mb-1">' + k + '</p><p class="text-sm">' + show + '</p></div>';
        }).join('');
      }

      kvGrid(d.order, document.getElementById('block-order-info'));
      kvGrid(d.customer, document.getElementById('block-customer-fields'));
      document.getElementById('block-customer-note').textContent = d.note;
      document.getElementById('block-customer-tags').innerHTML = d.tags.map(function (t) {
        return '<span class="inline-flex rounded px-2 py-0.5 text-xs font-medium text-blue-600 bg-blue-50 ring-1 ring-blue-100">' + t + '</span>';
      }).join('');

      var ic = d.ic;
      var icRows = [
        [['公司名称', ic.公司名称], ['法定代表人', ic.法定代表人], ['股份占比', ic.股份占比]],
        [['联系电话', ic.联系电话], ['身份证号码', ic.身份证号码]],
        [['内部财务', ic.内部财务], ['联系电话', ic.联系电话2], ['身份证号码', ic.身份证号码2]],
        [['注册资本', ic.注册资本], ['注册地址', ic.注册地址]]
      ];
      document.getElementById('block-ic-info').innerHTML = icRows.map(function (row) {
        return '<div class="grid grid-cols-1 sm:grid-cols-3 gap-x-4 gap-y-2">' + row.map(function (pair) {
          return '<div><p class="text-xs text-slate-500 mb-0.5">' + pair[0] + '</p><p class="text-slate-800">' + pair[1] + '</p></div>';
        }).join('') + '</div>';
      }).join('');
      document.getElementById('block-scope').textContent = d.scope;

      document.getElementById('progress-table-body').innerHTML = d.progress.map(function (p) {
        var op = p.action ? '<button type="button" class="text-blue-600 hover:underline">' + p.action + '</button>' : '—';
        return '<tr class="hover:bg-slate-50"><td class="px-3 py-2.5 border-b border-slate-100">' + p.node + '</td><td class="px-3 py-2.5 border-b border-slate-100">' + p.status + '</td><td class="px-3 py-2.5 border-b border-slate-100">' + p.agent + '</td><td class="px-3 py-2.5 border-b border-slate-100">' + p.date + '</td><td class="px-3 py-2.5 border-b border-slate-100">' + p.desc + '</td><td class="px-3 py-2.5 border-b border-slate-100">' + op + '</td></tr>';
      }).join('');

      var modalPd = document.getElementById('modal-progress-detail');
      document.getElementById('btn-add-progress-detail').addEventListener('click', function () {
        modalPd.classList.remove('hidden');
        modalPd.classList.add('flex');
      });
      modalPd.querySelectorAll('[data-close-pd]').forEach(function (el) {
        el.addEventListener('click', function () {
          modalPd.classList.add('hidden');
          modalPd.classList.remove('flex');
        });
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          modalPd.classList.add('hidden');
          modalPd.classList.remove('flex');
        }
      });
    })();
  </script>
</body>
</html>
